# Server
server.port=8080
spring.application.name=learner-platform-backend

# PostgreSQL Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/learner_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:learner_platform_jwt_secret_key_2024_super_secure}
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ML Service
app.ml-service.url=${ML_SERVICE_URL:http://localhost:8000}

# Notification Service
app.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:5000}

# Logging
logging.level.root=INFO
logging.level.com.learnerplatform=DEBUG
