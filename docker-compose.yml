version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: learner-postgres
    environment:
      POSTGRES_DB: learner_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - learner-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d learner_db']
      interval: 10s
      timeout: 5s
      retries: 5

  spring-backend:
    build: ./backend
    container_name: learner-spring-backend
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/learner_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: learner_platform_jwt_secret_key_2024_super_secure
      ML_SERVICE_URL: http://python-ml:8000
      NOTIFICATION_SERVICE_URL: http://node-notifications:5000
    depends_on:
      postgres:
        condition: service_healthy
      python-ml:
        condition: service_started
    networks:
      - learner-net

  react-frontend:
    build: ./learningFrontend
    container_name: learner-react-frontend
    ports:
      - '3000:80'
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_SOCKET_URL: http://localhost:5001
    depends_on:
      - spring-backend
    networks:
      - learner-net

  python-ml:
    build: ./PythonBackend
    container_name: learner-python-ml
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/learner_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learner-net

  node-notifications:
    build: ./nodejsBackend
    container_name: learner-node-notifications
    ports:
      - '5001:5000'
    environment:
      PORT: 5000
      SPRING_BACKEND_URL: http://spring-backend:8080
      JWT_SECRET: learner_platform_jwt_secret_key_2024_super_secure
    depends_on:
      - spring-backend
    networks:
      - learner-net

volumes:
  postgres_data:

networks:
  learner-net:
    driver: bridge
